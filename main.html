<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes">
  <title>Vehicle Type Predictor · Tailwind</title>
  <base href="./">
  <!-- Tailwind via CDN + base fonts -->
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;700&family=DM+Sans:wght@400;500&display=swap"
    rel="stylesheet">
  <style>
    /* custom extras that Tailwind doesn't cover: backdrop-blur + keyframe animations */
    body {
      font-family: 'DM Sans', sans-serif;
    }

    html::-webkit-scrollbar {
      display: none;
    }

    .font-rajdhani {
      font-family: 'Rajdhani', sans-serif;
    }

    /* subtle grid animation */
    @keyframes gridPulse {
      0% {
        opacity: 0.2;
        background-size: 50px 50px;
      }

      100% {
        opacity: 0.5;
        background-size: 55px 55px;
      }
    }

    .grid-bg {
      background-image:
        linear-gradient(rgba(30, 150, 255, 0.08) 1px, transparent 1px),
        linear-gradient(90deg, rgba(30, 150, 255, 0.08) 1px, transparent 1px);
      animation: gridPulse 10s infinite alternate;
    }

    /* floating particles (handful, responsive) */
    .particle {
      position: absolute;
      border-radius: 9999px;
      background: rgba(70, 170, 255, 0.2);
      filter: blur(3px);
      animation: float 18s infinite linear;
    }

    @keyframes float {
      0% {
        transform: translateY(100vh) scale(0.6);
        opacity: 0;
      }

      20% {
        opacity: 0.6;
      }

      100% {
        transform: translateY(-20vh) scale(1.8);
        opacity: 0;
      }
    }

    /* custom loader dots */
    .dot-pulse {
      animation: pulseDot 1.4s infinite;
    }

    @keyframes pulseDot {

      0%,
      100% {
        transform: scale(0.8);
        opacity: 0.4;
      }

      50% {
        transform: scale(1.3);
        opacity: 1;
      }
    }

    .scan-line {
      background: linear-gradient(90deg, transparent, #3b82f6, transparent);
      animation: scanMove 1.8s infinite;
    }

    @keyframes scanMove {
      0% {
        width: 2rem;
        opacity: 0.2;
      }

      50% {
        width: 12rem;
        opacity: 1;
      }

      100% {
        width: 2rem;
        opacity: 0.2;
      }
    }
  </style>
</head>

<body class="relative min-h-screen flex items-center justify-center p-3 sm:p-5 overflow-x-hidden bg-[#02040c]">

  <!-- background layers (fixed, full) -->
  <div class="fixed inset-0 grid-bg pointer-events-none z-0"></div>

  <!-- floating particles (responsive – hidden on very small if needed, but they scale) -->
  <div class="fixed inset-0 pointer-events-none z-0 overflow-hidden">
    <div class="particle w-2 h-2 left-[10%] sm:w-3 sm:h-3 sm:left-[15%] bg-blue-400/20 shadow-lg shadow-blue-500/30">
    </div>
    <div
      class="particle w-4 h-4 left-[30%] sm:w-5 sm:h-5 md:w-6 md:h-6 top-10 bg-indigo-300/20 shadow-lg shadow-indigo-400/40"
      style="animation-delay: 3s;"></div>
    <div class="particle w-3 h-3 left-[55%] sm:w-4 sm:h-4 bg-cyan-300/20 shadow-lg shadow-cyan-400/30"
      style="animation-delay: 7s;"></div>
    <div class="particle w-6 h-6 left-[75%] sm:w-7 sm:h-7 bg-purple-300/20 shadow-lg shadow-purple-400/30"
      style="animation-delay: 2s;"></div>
    <div class="particle w-2 h-2 left-[90%] sm:w-4 sm:h-4 bg-sky-300/20" style="animation-delay: 12s;"></div>
    <div class="particle w-5 h-5 left-[5%] bottom-10 bg-blue-300/20" style="animation-delay: 5s;"></div>
  </div>

  <!-- main card - fully responsive with tailwind -->
  <div
    class="relative z-20 w-full bg-white/5 backdrop-blur-xl border border-white/10 shadow-2xl shadow-blue-900/40 p-5 sm:p-7 md:p-8 transition-all duration-500 hover:border-blue-500/40">

    <!-- header -->
    <div
      class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-3 mb-6 md:mb-8 border-b border-blue-500/20 pb-4">
      <div class="flex items-center gap-3">
        <span class="text-4xl sm:text-5xl drop-shadow-[0_0_12px_#3b82f6]">🚗</span>
        <h1
          class="font-rajdhani font-bold text-3xl sm:text-4xl md:text-5xl bg-gradient-to-r from-blue-200 to-blue-400 bg-clip-text text-transparent tracking-wider drop-shadow-lg">
          Vehicle Predictor
        </h1>
      </div>
      <div
        class="text-xs sm:text-sm text-blue-200/90 bg-blue-950/50 border border-blue-500/40 rounded-md px-4 py-2 self-start sm:self-auto backdrop-blur-sm shadow-inner">
        ⚡ Upload · Analyze · Identify
      </div>
    </div>

    <div class="grid lg:grid-cols-2 gap-15">

      <div>
        <!-- hidden file input -->
        <input type="file" id="imageUpload" accept="image/*" class="hidden">

        <!-- drop zone - responsive padding & text -->
        <div id="dropZone"
          class="group relative w-full border-2 border-dashed border-blue-500/50 rounded bg-blue-950/20 backdrop-blur-sm p-8 sm:p-12 md:p-16 flex flex-col items-center justify-center cursor-pointer transition-all duration-300 hover:border-blue-400 hover:bg-blue-900/20 hover:shadow-[0_0_40px_#2563eb66] mb-6">

          <!-- default content (hidden once image loaded) -->
          <div id="dropIcon"
            class="text-7xl sm:text-8xl mb-3 drop-shadow-[0_0_20px_#3b82f6] transition-transform group-hover:scale-110">
            📁
          </div>
          <div id="dropLabel" class="font-rajdhani text-xl sm:text-3xl font-semibold text-blue-100 text-center">Drop
            image
            or click</div>
          <div id="dropHint" class="text-sm sm:text-base text-blue-300/70 mt-2 bg-black/30 px-5 py-1.5 rounded-full">JPG
            ·
            PNG · WEBP</div>

          <!-- preview image (hidden initially) -->
          <img id="preview" src="#" alt="preview"
            class="max-h-40 sm:max-h-60 rounded-3xl border-4 border-blue-500/50 shadow-2xl hidden object-contain">
 
        <!-- overlay change button (visible on hover) -->
        <div id="imgOverlay"
          class="absolute inset-0 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity duration-300 pointer-events-none">
          <button id="changeBtn"
            class="pointer-events-auto bg-slate-900/80 backdrop-blur-md border border-blue-400 text-white font-medium py-3 px-8 rounded-full text-lg shadow-[0_0_30px_#2563eb] hover:bg-blue-800/80 transition-all scale-90 hover:scale-100">
            Change image
          </button>
        </div>

      </div>

      <!-- analyze button -->
      <button id="predictBtn" disabled
        class="w-full font-rajdhani font-bold text-2xl sm:text-3xl md:text-4xl py-5 sm:py-6 rounded border border-blue-500/60 bg-gradient-to-r from-blue-900/80 to-indigo-900/80 backdrop-blur-sm text-white shadow-[0_15px_30px_-10px_#000] opacity-50 scale-[0.98] transition-all duration-300 flex items-center justify-center gap-3 mb-8 disabled:pointer-events-none">
        <span class="text-3xl">⚡</span> Analyze vehicle <span class="text-2xl">→</span>
      </button>

    </div>
    <!-- result card with dynamic states -->
    <div
      class="bg-black/40 flex-1 backdrop-blur-xl border border-white/10 p-6 sm:p-8 shadow-inner shadow-blue-500/10">
      <div class="font-rajdhani text-blue-300 tracking-[0.3em] text-sm sm:text-base mb-4">PREDICTION</div>

      <!-- loader (hidden by default) -->
      <div id="loader" class="hidden flex-col items-center gap-3 text-blue-200">
        <div class="text-lg">Processing image ...</div>
        <div class="flex gap-4">
          <div class="w-4 h-4 bg-blue-500 rounded-full dot-pulse shadow-[0_0_15px_#3b82f6]"></div>
          <div class="w-4 h-4 bg-blue-400 rounded-full dot-pulse shadow-[0_0_15px_#60a5fa]"
            style="animation-delay:0.2s"></div>
          <div class="w-4 h-4 bg-blue-300 rounded-full dot-pulse shadow-[0_0_15px_#93c5fd]"
            style="animation-delay:0.4s"></div>
        </div>
        <div class="h-1 bg-blue-500/30 rounded-full w-32 sm:w-48 mt-2 overflow-hidden">
          <div class="scan-line h-full"></div>
        </div>
      </div>

      <!-- idle message -->
      <div id="resultIdle" class="flex items-center gap-4 text-blue-300/80 text-base sm:text-lg">
        <span class="flex h-3 w-3 relative">
          <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-blue-400 opacity-75"></span>
          <span class="relative inline-flex rounded-full h-3 w-3 bg-blue-500"></span>
        </span>
        Upload an image to see the prediction
      </div>

      <!-- result content (hidden by default) -->
      <div id="resultContent" class="hidden flex-col sm:flex-row items-start sm:items-center justify-between gap-4">
        <img src="#" id="result" class="h-30 mb-10">
        <div id="resultBadge"
          class="bg-blue-950/80 border border-blue-500/70 rounded-full px-5 py-2.5 text-blue-100 text-sm sm:text-base shadow-lg whitespace-nowrap">
          AI Prediction</div>
      </div>
    </div>
  </div>
  </div>

  <script>
    (function () {
      const imageUpload = document.getElementById('imageUpload');
      const preview = document.getElementById('preview');
      const dropZone = document.getElementById('dropZone');
      const dropIcon = document.getElementById('dropIcon');
      const dropLabel = document.getElementById('dropLabel');
      const dropHint = document.getElementById('dropHint');
      const predictBtn = document.getElementById('predictBtn');
      const loader = document.getElementById('loader');
      const resultIdle = document.getElementById('resultIdle');
      const resultContent = document.getElementById('resultContent');
      const resultDiv = document.getElementById('result');
      const resultBadge = document.getElementById('resultBadge');
      const changeBtn = document.getElementById('changeBtn');

      let currentFile = null;

      function setImage(file) {
        if (!file.type.startsWith('image/')) {
          alert('Please select an image (JPEG, PNG, WEBP)');
          return;
        }
        currentFile = file;
        const url = URL.createObjectURL(file);
        preview.src = url;
        preview.classList.remove('hidden');
        preview.classList.add('block');

        // hide default drop content
        dropIcon.classList.add('hidden');
        dropLabel.classList.add('hidden');
        dropHint.classList.add('hidden');

        // enable predict button
        predictBtn.disabled = false;
        predictBtn.classList.remove('opacity-50', 'scale-[0.98]');
        predictBtn.classList.add('opacity-100', 'scale-100', 'hover:shadow-[0_0_50px_#3b82f6]');

        // reset result area to idle
        resultContent.classList.add('hidden');
        resultIdle.classList.remove('hidden');
        loader.classList.add('hidden');
      }

      // open file picker on dropzone click (if no image)
      dropZone.addEventListener('click', (e) => {
        if (e.target === changeBtn || changeBtn.contains(e.target)) return;
        if (!currentFile) imageUpload.click();
      });

      changeBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        imageUpload.click();
      });

      imageUpload.addEventListener('change', function () {
        if (this.files[0]) setImage(this.files[0]);
      });

      // drag & drop
      dropZone.addEventListener('dragover', (e) => {
        e.preventDefault();
        dropZone.classList.add('border-blue-400', 'bg-blue-900/30');
      });
      dropZone.addEventListener('dragleave', () => {
        dropZone.classList.remove('border-blue-400', 'bg-blue-900/30');
      });
      dropZone.addEventListener('drop', (e) => {
        e.preventDefault();
        dropZone.classList.remove('border-blue-400', 'bg-blue-900/30');
        if (e.dataTransfer.files[0]) setImage(e.dataTransfer.files[0]);
      });

      // analyze click
      predictBtn.addEventListener('click', async () => {
        if (!currentFile) return;

        predictBtn.disabled = true;
        predictBtn.classList.add('opacity-50');
        loader.classList.remove('hidden');
        resultIdle.classList.add('hidden');
        resultContent.classList.add('hidden');

        const formData = new FormData();
        formData.append('file', currentFile);

        try {
          const response = await fetch('http://localhost:8000/predict', {
            method: 'POST',
            body: formData
          });
          const data = await response.json();

          loader.classList.add('hidden');
          resultDiv.src = `/public/${data.prediction}.png`;
          resultBadge.innerText = `Score: ${data.score}`;
          resultBadge.classList.remove('border-red-500/70', 'bg-red-950/50');
          resultBadge.classList.add('border-blue-500/70', 'bg-blue-950/80');
        } catch (err) {
          loader.classList.add('hidden');
          resultDiv.innerText = `⚠️ offline demo`;
          // friendly mock result for responsiveness demonstration
          const mockTypes = ['SUV', 'Sedan', 'Pickup', 'Motorcycle', 'Van'];
          const mockConf = (0.6 + Math.random() * 0.35).toFixed(2);
          resultDiv.innerText = `Prediction: ${mockTypes[Math.floor(Math.random() * mockTypes.length)]}`;
          resultBadge.innerText = `mock score: ${mockConf}`;
          resultBadge.classList.remove('border-blue-500/70', 'bg-blue-950/80');
          resultBadge.classList.add('border-amber-500/70', 'bg-amber-950/50', 'text-amber-100');
        }

        resultContent.classList.remove('hidden');
        predictBtn.disabled = false;
        predictBtn.classList.remove('opacity-50');
      });
    })();
  </script>
</body>

</html>
